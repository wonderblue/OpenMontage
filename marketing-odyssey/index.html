<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Marketing Odyssey - Act 1</title>
  <!-- GSAP is natively supported and recommended for HyperFrames -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    body {
      margin: 0;
      background-color: #0a0a0a;
      color: #ffffff;
      font-family: 'Helvetica Neue', sans-serif;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 1920px;
      height: 1080px;
    }

    .scene {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      /* Hidden by default, GSAP will reveal */
    }

    h1 {
      font-size: 130px;
      font-weight: bold;
      text-align: center;
      margin: 0;
      background: -webkit-linear-gradient(#ff8a00, #e52e71);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 55px;
      max-width: 1400px;
      text-align: center;
      line-height: 1.4;
      color: #cccccc;
    }

    .local-insight {
      font-size: 45px;
      color: #ff8a00;
      font-style: italic;
      margin-top: 40px;
      padding: 20px 40px;
      border: 2px solid #ff8a00;
      border-radius: 15px;
    }

    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.3;
      z-index: -1;
    }
  </style>
</head>

<body>
  <div data-hf-id="hf-ix0t" class="container">
    <!-- Track 0: The Voiceover (Ensure you place a real audio file in your assets folder) -->
    <audio data-hf-id="hf-8k3n" id="voiceover" data-start="0" data-duration="240" data-track-index="0" src="assets/act1_voiceover.wav"></audio>

    <!-- Scene 1: Title Sequence (0s to 10s) -->
    <div data-hf-id="hf-uz45" id="scene1" class="scene" data-start="0" data-duration="10" data-track-index="1">
      <h1 data-hf-id="hf-j8a6" id="title-text">The Value Exchange</h1>
      <p data-hf-id="hf-5ont" id="subtitle-text">A Cinematic Journey into the Matrix of Marketing</p>
    </div>

    <!-- Scene 2: The 5 Concepts (10s to 30s) -->
    <div data-hf-id="hf-9m3u" id="scene2" class="scene" data-start="10" data-duration="20" data-track-index="1">
      <!-- Placeholder for a cinematic background of Guntur Mirchi Yard -->
      <img data-hf-id="hf-vmh0" class="bg-image" src="assets/guntur_yard.jpg" alt="Guntur Yard">
      <h1 data-hf-id="hf-3vju">The 5 Core Concepts</h1>
      <p data-hf-id="hf-qiuw">From mass production to saving the world.</p>
      <div data-hf-id="hf-gsa7" class="local-insight">Featuring: Parle-G, Mangalagiri Cotton, and Araku Coffee</div>
    </div>
  </div>

  <script>
    // HyperFrames controls the master timeline. We define the deterministic tweens.
    const tl = gsap.timeline();

    // Scene 1 Animations
    tl.to("#scene1", { opacity: 1, duration: 1, ease: "power2.inOut" }, 0)
      .from("#title-text", { y: 50, opacity: 0, duration: 1.5, ease: "back.out(1.7)" }, 0.5)
      .from("#subtitle-text", { y: 30, opacity: 0, duration: 1 }, 1.5)
      .to("#scene1", { opacity: 0, duration: 1, ease: "power2.inOut" }, 9);

    // Scene 2 Animations
    tl.to("#scene2", { opacity: 1, duration: 1, ease: "power2.inOut" }, 10)
      .from("#scene2 h1", { scale: 0.8, opacity: 0, duration: 1.5, ease: "power3.out" }, 10.5)
      .from("#scene2 p", { x: -50, opacity: 0, duration: 1 }, 11.5)
      .from(".local-insight", { y: 50, opacity: 0, duration: 1 }, 12.5)
      // Slow zoom on the background image for a cinematic effect
      .to(".bg-image", { scale: 1.1, duration: 20, ease: "none" }, 10)
      .to("#scene2", { opacity: 0, duration: 1, ease: "power2.inOut" }, 29);
  </script>
</body>

</html>
